<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Vesela Bojanka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f9ff;
            touch-action: manipulation;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background-color: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: crosshair;
        }
        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .color-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid white;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .color-btn:hover {
            transform: scale(1.1);
        }
        .color-btn.active {
            border-color: #3b82f6;
            transform: scale(1.2);
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">

    <!-- Zaglavlje -->
    <header class="text-center mb-6">
        <h1 class="text-4xl font-bold text-blue-600 mb-2">🎨 Moja Bojanka</h1>
        <p class="text-gray-600 italic">Izaberi boju i klikni na deo slike koji želiš da obojiš!</p>
    </header>

    <main class="w-full max-w-5xl flex flex-col md:flex-row gap-6">
        
        <!-- Bočna traka sa alatima -->
        <aside class="flex flex-col gap-4 bg-white p-4 rounded-2xl shadow-md md:w-48 order-2 md:order-1">
            <h2 class="font-bold text-center text-gray-700">Paleta Boja</h2>
            <div id="palette" class="grid grid-cols-4 md:grid-cols-2 gap-3 justify-items-center">
                <!-- Boje se generišu putem JS-a -->
            </div>
            
            <hr class="my-2">
            
            <div class="flex flex-col gap-2">
                <label for="imageUpload" class="bg-blue-500 hover:bg-blue-600 text-white text-center py-2 px-4 rounded-lg cursor-pointer transition text-sm">
                    📁 Ubaci Sliku
                </label>
                <input type="file" id="imageUpload" accept="image/*" class="hidden">
                
                <button id="clearBtn" class="bg-red-500 hover:bg-red-600 text-white py-2 px-4 rounded-lg transition text-sm">
                    🗑️ Očisti Sve
                </button>
                
                <button id="downloadBtn" class="bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg transition text-sm">
                    💾 Sačuvaj Rad
                </button>
            </div>
        </aside>

        <!-- Glavni Canvas -->
        <section id="canvas-container" class="flex-grow order-1 md:order-2 flex items-center justify-center border-4 border-dashed border-blue-200">
            <canvas id="paintCanvas"></canvas>
        </section>

    </main>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const palette = document.getElementById('palette');
        const imageUpload = document.getElementById('imageUpload');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let currentColor = '#ff0000';
        let originalImage = null;

        const colors = [
            '#ff0000', '#00ff00', '#0000ff', '#ffff00', 
            '#ffa500', '#800080', '#ffc0cb', '#a52a2a', 
            '#ffffff', '#000000', '#00ffff', '#7fff00',
            '#ffd700', '#ff69b4', '#40e0d0', '#c0c0c0'
        ];

        // Inicijalizacija palete
        colors.forEach((color, index) => {
            const btn = document.createElement('div');
            btn.className = 'color-btn' + (index === 0 ? ' active' : '');
            btn.style.backgroundColor = color;
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = color;
            };
            palette.appendChild(btn);
        });

        // Osnovna slika (Pinocchio primer)
        window.onload = () => {
            loadDefaultImage();
        };

        function loadDefaultImage() {
            const img = new Image();
            img.crossOrigin = "anonymous";
            // Koristimo placeholder bojanku ako nema slike
            img.src = 'https://img.freepik.com/free-vector/hand-drawn-pinocchio-illustration_23-2148855325.jpg?semt=ais_hybrid'; 
            img.onload = () => setupCanvas(img);
        }

        function setupCanvas(img) {
            originalImage = img;
            // Postavljanje veličine platna
            const maxWidth = 800;
            const scale = Math.min(maxWidth / img.width, 1);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            // Osiguravamo da su linije čiste
            makeBlackAndWhite();
        }

        function makeBlackAndWhite() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                const val = avg > 200 ? 255 : 0; // Granična vrednost za "čistu" bojanku
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // Upload korisničke slike
        imageUpload.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => setupCanvas(img);
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Flood Fill Algoritam
        canvas.addEventListener('mousedown', handleAction);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleAction(e.touches[0]);
        });

        function handleAction(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.round((e.clientY - rect.top) * (canvas.height / rect.height));
            
            floodFill(x, y, hexToRgb(currentColor));
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const width = imageData.width;
            const height = imageData.height;
            const pixels = imageData.data;

            const startPos = (startY * width + startX) * 4;
            const startR = pixels[startPos];
            const startG = pixels[startPos + 1];
            const startB = pixels[startPos + 2];

            // Ne bojimo ako je kliknuto na crnu liniju ili ako je boja ista
            if (startR < 50 && startG < 50 && startB < 50) return; 
            if (startR === fillColor.r && startG === fillColor.g && startB === fillColor.b) return;

            const stack = [[startX, startY]];

            while (stack.length > 0) {
                const [x, y] = stack.pop();
                let pos = (y * width + x) * 4;

                if (x < 0 || x >= width || y < 0 || y >= height) continue;
                if (pixels[pos] !== startR || pixels[pos + 1] !== startG || pixels[pos + 2] !== startB) continue;

                // Bojenje piksela
                pixels[pos] = fillColor.r;
                pixels[pos + 1] = fillColor.g;
                pixels[pos + 2] = fillColor.b;
                pixels[pos + 3] = 255;

                stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
            }

            ctx.putImageData(imageData, 0, 0);
        }

        clearBtn.onclick = () => {
            if (originalImage) setupCanvas(originalImage);
        };

        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = 'moja-bojanka.png';
            link.href = canvas.toDataURL();
            link.click();
        };
    </script>
</body>
</html>
